name: Run VA Public Opportunities Scraper
on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'
jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      crisdel_client_id: ${{ secrets.crisdel_client_id }}
      crisdel_tenant_id: ${{ secrets.crisdel_tenant_id }}
      crisdel_client_secret: ${{ secrets.crisdel_client_secret }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python va_public_opportunities.py

      - name: Commit updated history file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_opportunities.json
          git diff --quiet --cached || git commit -m "Update seen opportunities history [skip ci]"
          git pull --rebase origin main
          git push
