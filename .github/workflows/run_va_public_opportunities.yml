name: Run VA Public Opportunities Scraper

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    env:
      crisdel_client_id: ${{ secrets.crisdel_client_id }}
      crisdel_tenant_id: ${{ secrets.crisdel_tenant_id }}
      crisdel_client_secret: ${{ secrets.crisdel_client_secret }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python va_public_opportunities.py
